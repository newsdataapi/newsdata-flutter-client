name: Publish to pub.dev

# Publishes to pub.dev when a v-prefixed tag is pushed (e.g. v0.0.2).
# Optionally trigger manually from the Actions tab via "Run workflow".
#
# Tokenless publishing via OIDC: configure a "Publisher" on pub.dev once at
#   https://pub.dev/packages/newsdataapi/admin
# with GitHub Actions, this repo, tag pattern `v{{version}}`, and tick at
# least "Enable publishing from `push` events" (and optionally
# "Enable publishing from `workflow_dispatch` events" to allow the
# manual-trigger publish here).
#
# Note: pub.dev's OIDC trusted publishing does NOT accept `release` events
# (only `push` and `workflow_dispatch`), so this workflow triggers on tag
# push. Creating a GitHub Release for documentation is separate and can be
# done before or after — it no longer fires the publish.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: {}

permissions:
  contents: read
  id-token: write # required for OIDC token exchange with pub.dev

jobs:
  publish:
    name: Test & publish
    runs-on: ubuntu-latest
    environment:
      name: pub.dev
      url: https://pub.dev/packages/newsdataapi
    steps:
      - uses: actions/checkout@v4

      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - name: Install dependencies
        run: dart pub get

      - name: Verify formatting
        run: dart format --output=none --set-exit-if-changed lib test example

      - name: Analyze
        run: dart analyze --fatal-infos

      - name: Test
        run: dart test

      # Verify pubspec.yaml version matches the release tag (strip leading v).
      - name: Verify tag matches pubspec version
        run: |
          PKG_VERSION="$(awk '/^version:/ {print $2}' pubspec.yaml)"
          TAG="${GITHUB_REF_NAME#v}"
          if [ "$PKG_VERSION" != "$TAG" ]; then
            echo "::error::Release tag '$GITHUB_REF_NAME' does not match pubspec.yaml version '$PKG_VERSION'"
            exit 1
          fi

      - name: Publish
        run: dart pub publish --force
